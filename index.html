        <button onclick="generatePDFReport()" style="padding:8px 14px;background:var(--vic-orange);color:#fff;border-radius:var(--radius-xs);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF</button>
      </div>
    </div>
    <div class="dash-toggle">
      <button class="${state.dashMode==='summary'?'active':''}" onclick="state.dashMode='summary';renderDashboard()">Summary</button>
      <button class="${state.dashMode==='table'?'active':''}" onclick="state.dashMode='table';renderDashboard()">Table</button>
      <button class="${state.dashMode==='heatmap'?'active':''}" onclick="state.dashMode='heatmap';renderDashboard()">Heatmap</button>
    </div>
    ${filterHtml}
    <div id="dash-content"></div>
  `;
  if (state.dashMode === 'summary') renderDashboardSummary();
  else if (state.dashMode === 'table') renderDashboardTable();
  else renderDashboardHeatmap();
}

function renderDashboardSummary() {
  const el = document.getElementById('dash-content');
  const accounts = getDashFilteredAccounts();
  // Always recalc stages from checklist truth before rendering
  accounts.forEach(a => { a.current_stage = recalcCurrentStage(a.id); });
  const isManager = state.profile?.role === 'manager' || state.profile?.role === 'admin';
  const au = accounts.filter(a => a.country === 'AU');
  const nz = accounts.filter(a => a.country === 'NZ');
  const stageCounts = [0, 0, 0, 0, 0];
  accounts.forEach(a => stageCounts[a.current_stage - 1]++);
  const maxCount = Math.max(...stageCounts, 1);

  // Find weaknesses: accounts with < 50% completion at current stage
  const weaknesses = [];
  accounts.forEach(a => {
    const comp = getStageCompletion(a.id, a.current_stage);
    if (comp.pct < 50 && comp.total > 0) {
      weaknesses.push({ id: a.id, name: a.company_name, stage: STAGES[a.current_stage].name, pct: comp.pct, tier: a.tier });
    }
  });
  weaknesses.sort((a, b) => a.pct - b.pct);

  let html = `
    <div class="dash-section" style="padding:10px 0">
      <div style="display:flex;text-align:center">
        <div onclick="filterToAccounts()" style="cursor:pointer;flex:1;border-right:1px solid var(--g200)"><span style="font-size:20px;font-weight:700;color:var(--vic-black)">${accounts.length}</span><div style="font-size:10px;color:var(--g400);text-transform:uppercase;font-weight:600;margin-top:2px">Accounts</div></div>
        ${isManager ? `<div onclick="filterByCountry('AU')" style="cursor:pointer;flex:1;border-right:1px solid var(--g200)"><span style="font-size:20px;font-weight:700;color:var(--vic-orange)">${au.length}</span><div style="font-size:10px;color:var(--g400);font-weight:600;margin-top:2px">AU</div></div>
        <div onclick="filterByCountry('NZ')" style="cursor:pointer;flex:1;border-right:1px solid var(--g200)"><span style="font-size:20px;font-weight:700;color:#3b82f6">${nz.length}</span><div style="font-size:10px;color:var(--g400);font-weight:600;margin-top:2px">NZ</div></div>` : ''}
        <div onclick="filterConverting()" style="cursor:pointer;flex:1"><span style="font-size:20px;font-weight:700;color:var(--success)">${accounts.filter(a => a.current_stage >= 4).length}</span><div style="font-size:10px;color:var(--g400);text-transform:uppercase;font-weight:600;margin-top:2px">Converting</div></div>
      </div>
    </div>

    ${(() => {
      const fx = fxSymbol();
      const auRev = au.reduce((s,a) => s + toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency), 0);
      const nzRev = nz.reduce((s,a) => s + toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency), 0);
      const totalRev = auRev + nzRev;
      let pipelineCountries = null;
      const selectedIds = [...state.dashFilterRep, ...state.dashFilterManager];
      if (selectedIds.length > 0) {
        pipelineCountries = new Set((state.profiles || []).filter(p => selectedIds.includes(p.id)).map(p => p.country).filter(Boolean));
      } else if (!isManager && state.profile?.country) {
        pipelineCountries = new Set([state.profile.country]);
      }
      const showAU = pipelineCountries ? pipelineCountries.has('AU') : au.length > 0;
      const showNZ = pipelineCountries ? pipelineCountries.has('NZ') : nz.length > 0;
      const auPct = totalRev > 0 ? (auRev / totalRev * 100) : 50;
      const nzPct = totalRev > 0 ? (nzRev / totalRev * 100) : 50;
      const singleCountry = showAU && !showNZ ? 'AU' : !showAU && showNZ ? 'NZ' : null;
      return `<div class="dash-section" style="padding:12px 16px">
        <div style="display:flex;align-items:baseline;justify-content:center;gap:8px;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500)">Opportunity${singleCountry ? ' — '+singleCountry : ''}</span>
          <span style="font-size:11px;font-weight:700;color:var(--vic-black)">${fx}${formatNumber(Math.round(totalRev))}</span>
        </div>
        ${singleCountry ? (() => { const cRev = singleCountry==='AU' ? auRev : nzRev; return `
        <div style="height:24px;border-radius:6px;overflow:hidden;background:${singleCountry==='AU'?'var(--vic-orange)':'#3b82f6'};display:flex;align-items:center;justify-content:center">
          <span style="font-size:11px;font-weight:700;color:#fff">${fx}${formatNumber(Math.round(cRev))}</span>
        </div>`; })() : `
        <div style="display:flex;height:24px;border-radius:6px;overflow:hidden;cursor:pointer">
          <div onclick="setDashFilter('dashFilterCountry','AU')" style="width:${Math.max(auPct,5)}%;background:var(--vic-orange);display:flex;align-items:center;justify-content:center;transition:width .3s">
            <span style="font-size:11px;font-weight:700;color:#fff">AU ${Math.round(auPct)}%</span>
          </div>
          <div onclick="setDashFilter('dashFilterCountry','NZ')" style="width:${Math.max(nzPct,5)}%;background:#3b82f6;display:flex;align-items:center;justify-content:center;transition:width .3s">
            <span style="font-size:11px;font-weight:700;color:#fff">NZ ${Math.round(nzPct)}%</span>
          </div>
        </div>
        `}
      </div>`;
    })()}

    <div class="dash-grid">
      <div class="dash-section">
        <h3>Conversion Funnel</h3>
        <div class="funnel-chart">
          ${[1,2,3,4,5].map(s => `
            <div class="funnel-row" onclick="filterByStage(${s})" style="cursor:pointer" title="View ${STAGES[s].name} accounts">
              <div class="funnel-row-label">${STAGES[s].name}</div>
              <div class="funnel-row-bar-wrap">
                <div class="funnel-row-bar" style="width:${Math.max(stageCounts[s-1]/maxCount*100, 8)}%;background:${s<=2?'var(--vic-orange)':s<=3?'#F59E0B':s<=4?'var(--success)':'#059669'}">
                  <span>${stageCounts[s-1]}</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="dash-section">
        <h3>Tier Breakdown</h3>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${[1,2,3].map(t => `<div class="stat-card" onclick="filterByTier(${t})" style="cursor:pointer">
            <div class="stat-value" style="font-size:20px">${accounts.filter(a=>a.tier===t).length}</div>
            <div class="stat-label">Tier ${t}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;

  // Team Scoreboard (managers only)
  if (isManager) {
    const filteredAccounts = accounts;
    const repProfiles = (state.profiles||[]).filter(p => p.role === 'rep' || p.role === 'manager' || p.role === 'admin');
    const repData = repProfiles.map(p => {
      const pAccts = filteredAccounts.filter(a => a.assigned_to === p.id);
      const rev = pAccts.reduce((s,a) => s + toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency), 0);
      const stages = [0,0,0,0,0];
      pAccts.forEach(a => stages[a.current_stage-1]++);
      const avgStage = pAccts.length ? (pAccts.reduce((s,a)=>s+a.current_stage,0)/pAccts.length) : 0;
      return { ...p, accts: pAccts.length, rev, stages, avgStage };
    }).filter(d => d.accts > 0);

    // Sort scoreboard
    const sbDir = state.sbSortDir === 'asc' ? 1 : -1;
    if (state.sbSortCol === 'name') repData.sort((a,b) => sbDir * (a.full_name||'').localeCompare(b.full_name||''));
    else if (state.sbSortCol === 'accts') repData.sort((a,b) => sbDir * (a.accts - b.accts));
    else if (state.sbSortCol === 'opp') repData.sort((a,b) => sbDir * (a.rev - b.rev));

    const maxAccts = Math.max(...repData.map(d=>d.accts), 1);
    const stageColors = ['#F58220','#f59e0b','#3b82f6','#10b981','#059669'];
    const sbIcon = (col) => {
      if (state.sbSortCol !== col) return '<span style="opacity:.3;font-size:10px"> ⇅</span>';
      return state.sbSortDir === 'asc' ? '<span style="font-size:10px"> ↑</span>' : '<span style="font-size:10px"> ↓</span>';
    };

    if (repData.length) {
      let rows = repData.map(d => `
        <div onclick="setDashFilter('dashFilterRep','${d.id}')" style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--g100);cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--g50)'" onmouseout="this.style.background=''">
          <div style="width:130px;flex-shrink:0">
            <div style="font-weight:600;font-size:13px;color:var(--g700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.full_name||'—')}</div>
            <div style="font-size:10px;color:var(--g400)">${d.country||'—'}</div>
          </div>
          <div style="flex:1;display:flex;gap:1px;height:22px;border-radius:4px;overflow:hidden;max-width:${(d.accts/maxAccts*100)}%">
            ${d.stages.map((c,i) => c > 0 ? `<div style="flex:${c};background:${stageColors[i]};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff" title="${STAGES[i+1].name}: ${c}">${c}</div>` : '').join('')}
          </div>
          <div style="width:80px;flex-shrink:0;text-align:right;font-size:12px;color:var(--g500)">
            <span style="font-weight:700;color:var(--g700)">${d.accts}</span> accts
          </div>
          <div style="width:90px;flex-shrink:0;text-align:right;font-size:12px;color:var(--g500)">
            ${fxSymbol()}${formatNumber(Math.round(d.rev))}
          </div>
        </div>
      `).join('');
      html += `<div class="dash-section">
        <h3 style="margin-bottom:4px">Team Scoreboard</h3>
        <div style="display:flex;gap:10px;font-size:10px;color:var(--g400);margin-bottom:8px">
          ${stageColors.map((c,i) => `<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:${c}"></span>${STAGES[i+1].name}</span>`).join('')}
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--g200)">
          <div onclick="sbSort('name')" style="width:130px;flex-shrink:0;font-size:11px;font-weight:600;color:var(--g500);cursor:pointer">Name${sbIcon('name')}</div>
          <div style="flex:1"></div>
          <div onclick="sbSort('accts')" style="width:80px;flex-shrink:0;text-align:right;font-size:11px;font-weight:600;color:var(--g500);cursor:pointer">Accts${sbIcon('accts')}</div>
          <div onclick="sbSort('opp')" style="width:90px;flex-shrink:0;text-align:right;font-size:11px;font-weight:600;color:var(--g500);cursor:pointer">Opportunity${sbIcon('opp')}</div>
        </div>
        <div>
          ${rows}
        </div>
      </div>`;
    }
  }

  if (weaknesses.length) {
    html += `<div class="dash-section">
      <h3>Needs Attention</h3>
      <ul class="weakness-list">
        ${weaknesses.slice(0, 10).map(w => `<li class="weakness-item" onclick="showAccountDetail('${w.id}')" style="cursor:pointer">
          <span class="weakness-dot ${w.pct === 0 ? 'red' : 'amber'}"></span>
          <span style="flex:1"><strong>${esc(w.name)}</strong> — stuck at ${w.stage} (${w.pct}% complete)</span>
          <span class="badge badge-tier${w.tier}">T${w.tier}</span>
        </li>`).join('')}
      </ul>
    </div>`;
  }

  el.innerHTML = html;
}

function dashSort(col) {
  if (state.dashSortCol === col) {
    state.dashSortDir = state.dashSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    state.dashSortCol = col;
    state.dashSortDir = 'asc';
  }
  renderDashboardTable();
}

function renderDashboardTable() {
  const el = document.getElementById('dash-content');
  const accounts = [...getDashFilteredAccounts()];
  const repName = (uid) => { const p = state.profiles.find(pr => pr.id === uid); return p ? p.full_name : '—'; };
  const dir = state.dashSortDir === 'asc' ? 1 : -1;

  // Pre-compute progress for sorting
  const progCache = {};
  accounts.forEach(a => { progCache[a.id] = getStageCompletion(a.id, a.current_stage); });

  accounts.sort((a, b) => {
    let v = 0;
    switch (state.dashSortCol) {
      case 'company': v = a.company_name.localeCompare(b.company_name); break;
      case 'country': v = (a.country||'').localeCompare(b.country||''); break;
      case 'tier': v = a.tier - b.tier; break;
      case 'stage': v = a.current_stage - b.current_stage; break;
      case 'progress': v = progCache[a.id].pct - progCache[b.id].pct; break;
      case 'rep': v = repName(a.assigned_to).localeCompare(repName(b.assigned_to)); break;
      case 'revenue': v = toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency) - toDisplayCurrency(parseFloat(b.estimated_revenue)||0, b.currency); break;
      default: v = a.tier - b.tier;
    }
    return v * dir || a.company_name.localeCompare(b.company_name);
  });

  const sortIcon = (col) => {
    if (state.dashSortCol !== col) return '<span style="opacity:.3;font-size:10px"> ⇅</span>';
    return state.dashSortDir === 'asc' ? '<span style="font-size:10px"> ↑</span>' : '<span style="font-size:10px"> ↓</span>';
  };
  const thStyle = 'cursor:pointer;user-select:none;white-space:nowrap';

  el.innerHTML = `<div class="dash-section"><div class="table-wrap">
    <table class="data-table">
      <thead><tr>
        <th style="${thStyle}" onclick="dashSort('company')">Company${sortIcon('company')}</th>
        <th style="${thStyle}" onclick="dashSort('country')">Country${sortIcon('country')}</th>
        <th style="${thStyle}" onclick="dashSort('tier')">Tier${sortIcon('tier')}</th>
        <th style="${thStyle}" onclick="dashSort('stage')">Stage${sortIcon('stage')}</th>
        <th style="${thStyle}" onclick="dashSort('progress')">Progress${sortIcon('progress')}</th>
        <th style="${thStyle}" onclick="dashSort('revenue')">Revenue${sortIcon('revenue')}</th>
        <th style="${thStyle}" onclick="dashSort('rep')">Rep${sortIcon('rep')}</th>
      </tr></thead>
      <tbody>
        ${accounts.map(a => {
          const comp = progCache[a.id];
          const rev = toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency);
          return `<tr onclick="showAccountDetail('${a.id}')" style="cursor:pointer">
            <td><strong>${esc(a.company_name)}</strong></td>
            <td><span class="badge badge-${a.country.toLowerCase()}">${a.country}</span></td>
            <td><span class="badge badge-tier${a.tier}">T${a.tier}</span></td>
            <td>${STAGES[a.current_stage].name}</td>
            <td><div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;height:6px;background:var(--g200);border-radius:3px;overflow:hidden">
                <div style="width:${comp.pct}%;height:100%;background:var(--vic-orange);border-radius:3px"></div>
              </div>
              <span style="font-size:12px;font-weight:600;color:var(--g500)">${comp.done}/${comp.total}</span>
            </div></td>
            <td style="font-size:13px;color:var(--g500)">${fxSymbol()}${formatNumber(Math.round(rev))}</td>
            <td style="font-size:13px;color:var(--g500)">${repName(a.assigned_to)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div></div>`;
}

function renderDashboardHeatmap(targetId) {
  const el = document.getElementById(targetId || 'dash-content');
  const accounts = targetId ? state.accounts : getDashFilteredAccounts();

  // AU states + NZ regions — show based on user's country (managers see both)
  const isManager = state.profile?.role === 'manager' || state.profile?.role === 'admin';
  const userCountry = state.profile?.country;
  const showAU = isManager || userCountry === 'AU' || !userCountry;
  const showNZ = isManager || userCountry === 'NZ';
  const auStates = ['NSW','VIC','QLD','WA','SA','TAS','ACT','NT'];
  const nzRegions = ['NTL','AKL','WKO','BOP','GIS','HKB','TKI','MWT','WGN','TSM','NSN','MBH','WTC','CAN','OTA','STL'];

  // Count accounts per region
  function regionCounts(regionList) {
    const counts = {};
    regionList.forEach(r => { counts[r] = { total: 0, stage1: 0, stage2: 0, stage3: 0, stage4: 0, stage5: 0, accounts: [] }; });
    accounts.forEach(a => {
      const acctRegions = (a.regions || '').split(',').map(s => s.trim()).filter(Boolean);
      if (!acctRegions.length) return;
      acctRegions.forEach(r => {
        if (counts[r]) {
          counts[r].total++;
          counts[r]['stage' + a.current_stage]++;
          counts[r].accounts.push(a);
        }
      });
    });
    return counts;
  }

  const auCounts = regionCounts(auStates);
  const nzCounts = regionCounts(nzRegions);

  function heatColor(count, max) {
    if (count === 0) return 'var(--g100)';
    const intensity = Math.min(count / Math.max(max, 1), 1);
    if (intensity <= 0.33) return '#FEF3C7';
    if (intensity <= 0.66) return '#FDBA74';
    return '#F58220';
  }

  function initLeafletMap(containerId, regions, counts) {
    if (leafletMap) { leafletMap.remove(); leafletMap = null; }
    const container = document.getElementById(containerId);
    if (!container) return;

    const hasAU = regions.some(r => AU_REGIONS.includes(r));
    const hasNZ = regions.some(r => NZ_REGIONS.includes(r));
    let center, zoom;
    if (hasAU && hasNZ) { center = [-32, 155]; zoom = 4; }
    else if (hasAU) { center = [-28, 134]; zoom = 4; }
    else { center = [-41, 174]; zoom = 6; }

    leafletMap = L.map(containerId, { scrollWheelZoom: false, zoomControl: true, attributionControl: false }).setView(center, zoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 10, minZoom: 3
    }).addTo(leafletMap);

    const maxCount = Math.max(...Object.values(counts).map(c => c.total), 1);
    const stageColors = ['','#F58220','#F59E0B','#3B82F6','#10B981','#059669'];
    const stageNames = ['','Identify','Engage','Demonstrate','Convert','Grow & Retain'];

    regions.forEach(r => {
      const coord = MAP_CENTROIDS[r];
      if (!coord) return;
      const c = counts[r] || { total:0,stage1:0,stage2:0,stage3:0,stage4:0,stage5:0 };
      if (c.total === 0) return;
      const radius = Math.min(12 + c.total * 5, 40);
      const intensity = c.total / maxCount;
      const fillColor = intensity <= 0.33 ? '#FEF3C7' : intensity <= 0.66 ? '#FDBA74' : '#F58220';

      const circle = L.circleMarker(coord, {
        radius, fillColor, color: '#F58220',
        weight: 2, opacity: 1, fillOpacity: 0.85
      }).addTo(leafletMap);

      // Count label overlay
      if (c.total > 0) {
        L.marker(coord, { interactive: false, icon: L.divIcon({
          className: '', iconSize: [40, 20], iconAnchor: [20, 10],
          html: `<div style="text-align:center;font-weight:800;font-size:14px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)">${c.total}</div>`
        })}).addTo(leafletMap);
      }

      // Popup with stage breakdown
      if (c.total > 0) {
        let html = `<div class="map-popup-title">${REGION_NAMES[r]||r}</div>`;
        html += `<div class="map-popup-stat"><strong>Total</strong><strong>${c.total}</strong></div>`;
        for (let s = 1; s <= 5; s++) {
          if (c['stage'+s]) html += `<div class="map-popup-stat"><span><span class="map-popup-dot" style="background:${stageColors[s]}"></span>${stageNames[s]}</span><span>${c['stage'+s]}</span></div>`;
        }
        circle.bindPopup(html, { maxWidth: 220 });
        circle.on('click', () => { setFilter('region', r); showView('accounts'); });
      }
    });
    setTimeout(() => { if (leafletMap) leafletMap.invalidateSize(); }, 150);
  }

  // Rep coverage map
  const repMap = {};
  accounts.forEach(a => {
    const rep = getRepName(a.assigned_to) || 'Unassigned';
    if (!repMap[rep]) repMap[rep] = { regions: new Set(), count: 0, stages: {} };
    repMap[rep].count++;
    const acctRegions = (a.regions || '').split(',').map(s => s.trim()).filter(Boolean);
    acctRegions.forEach(r => repMap[rep].regions.add(r));
    repMap[rep].stages[a.current_stage] = (repMap[rep].stages[a.current_stage] || 0) + 1;
  });

  let repHtml = '';
  if (Object.keys(repMap).length) {
    repHtml = `<div class="dash-section">
      <h3>Rep Coverage</h3>
      <div class="table-wrap"><table class="data-table">
        <thead><tr><th>Rep</th><th>Accounts</th><th>Regions</th><th>Avg Stage</th></tr></thead>
        <tbody>${Object.entries(repMap).sort((a,b) => b[1].count - a[1].count).map(([name, data]) => {
          const avgStage = Object.entries(data.stages).reduce((sum, [s, c]) => sum + parseInt(s) * c, 0) / data.count;
          return `<tr>
            <td><strong>${esc(name)}</strong></td>
            <td>${data.count}</td>
            <td style="font-size:12px">${[...data.regions].join(', ') || '—'}</td>
            <td><span style="font-weight:600;color:var(--vic-orange)">${avgStage.toFixed(1)}</span></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  }

  // Unassigned accounts warning
  const unassigned = accounts.filter(a => !a.regions || a.regions.trim() === '');
  let unassignedHtml = '';
  if (unassigned.length) {
    unassignedHtml = `<div class="dash-section">
      <h3 style="color:var(--danger)">No Region Assigned (${unassigned.length})</h3>
      <ul class="weakness-list">${unassigned.map(a => `
        <li class="weakness-item" onclick="showAccountDetail('${a.id}')" style="cursor:pointer">
          <span class="weakness-dot amber"></span>
          <span style="flex:1"><strong>${esc(a.company_name)}</strong></span>
          <span class="badge badge-${a.country.toLowerCase()}">${a.country}</span>
        </li>`).join('')}
      </ul>
    </div>`;
  }

  el.innerHTML = `
    <div class="heatmap-legend">
      <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g500)">
        <span style="width:14px;height:14px;background:var(--g100);border-radius:3px;display:inline-block"></span> None
        <span style="width:14px;height:14px;background:#FEF3C7;border-radius:3px;display:inline-block"></span> Low
        <span style="width:14px;height:14px;background:#FDBA74;border-radius:3px;display:inline-block"></span> Medium
        <span style="width:14px;height:14px;background:#F58220;border-radius:3px;display:inline-block"></span> High
      </span>
      <span style="font-size:11px;color:var(--g400)">Stage dots:
        <span style="color:#F58220">Identify</span> ·
        <span style="color:#F59E0B">Engage</span> ·
        <span style="color:#3B82F6">Demonstrate</span> ·
        <span style="color:#10B981">Convert</span> ·
        <span style="color:#059669">Grow &amp; Retain</span>
      </span>
    </div>
    <div class="dash-section">
      <h3>Account Locations</h3>
      <div id="leaflet-heatmap" class="leaflet-map-container"></div>
    </div>
    ${repHtml}
    ${unassignedHtml}
  `;

  // Initialize Leaflet map after DOM is ready
  const mapRegions = [];
  const allCounts = {};
  if (showAU) { auStates.forEach(r => { mapRegions.push(r); allCounts[r] = auCounts[r]; }); }
  if (showNZ) { nzRegions.forEach(r => { mapRegions.push(r); allCounts[r] = nzCounts[r]; }); }
  requestAnimationFrame(() => initLeafletMap('leaflet-heatmap', mapRegions, allCounts));
}

function renderTeamView() {
  const el = document.getElementById('view-team');
  const profiles = state.profiles || [];

  // Build hierarchy from reports_to field
  const managers = profiles.filter(p => p.role === 'manager' || p.role === 'admin');
  const reps = profiles.filter(p => p.role === 'rep');

  // Find the top-level manager (divisional - no reports_to, or reports_to is null among managers)
  const topManager = managers.find(m => !m.reports_to || !managers.some(mm => mm.id === m.reports_to)) || managers[0];
  const midManagers = managers.filter(m => m.id !== topManager?.id);

  // Sort reps alphabetically by last name
  const sortByLastName = (a, b) => {
    const lastA = (a.full_name || '').split(' ').pop().toLowerCase();
    const lastB = (b.full_name || '').split(' ').pop().toLowerCase();
    return lastA.localeCompare(lastB);
  };
  reps.sort(sortByLastName);
  midManagers.sort(sortByLastName);

  let html = '<div class="view-header"><h1>Teams</h1></div>';
  html += '<div style="padding:0 16px">';

  if (profiles.length === 0) {
    html += '<div class="profile-card"><p style="color:var(--g500)">No team members found. Users will appear here once accounts are created.</p></div>';
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  // Top manager card
  if (topManager) {
    html += `<div class="profile-card" style="border-left:4px solid #1a1a1a;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px">${(topManager.full_name||'?')[0]}</div>
        <div>
          <div style="font-weight:700;font-size:15px">${esc(topManager.full_name)}</div>
          <div style="font-size:12px;color:var(--g500)">Divisional Manager</div>
          ${topManager.region ? '<div style="font-size:11px;color:var(--g400)">'+esc(topManager.region)+'</div>' : ''}
        </div>
      </div>
    </div>`;
  }

  // Mid-level managers with their reps
  const managersToShow = midManagers.length > 0 ? midManagers : (topManager ? [] : managers);

  managersToShow.forEach(mgr => {
    const mgrReps = reps.filter(r => r.reports_to === mgr.id);
    mgrReps.sort(sortByLastName);

    html += `<div class="profile-card" style="border-left:4px solid var(--vic-orange);margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:${mgrReps.length ? '12' : '0'}px">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--vic-orange);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px">${(mgr.full_name||'?')[0]}</div>
        <div>
          <div style="font-weight:700;font-size:14px">${esc(mgr.full_name)}</div>
          <div style="font-size:12px;color:var(--g500)">Regional Manager</div>
          ${mgr.region ? '<div style="font-size:11px;color:var(--g400)">'+esc(mgr.region)+'</div>' : ''}
        </div>
      </div>`;

    if (mgrReps.length) {
      html += '<div style="margin-left:24px;border-left:2px solid var(--g200);padding-left:16px">';
      mgrReps.forEach(rep => {
        const repAccounts = (state.accounts || []).filter(a => a.assigned_to === rep.id).length;
        html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)">
          <div style="width:30px;height:30px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:var(--g600)">${(rep.full_name||'?')[0]}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${esc(rep.full_name)}</div>
            ${rep.region ? '<span style="font-size:11px;color:var(--g400)">'+esc(rep.region)+'</span>' : ''}
          </div>
          <div style="font-size:12px;color:var(--g500)">${repAccounts} account${repAccounts!==1?'s':''}</div>
        </div>`;
      });
      html += '</div>';
    }

    html += '</div>';
  });

  // Unassigned reps (no reports_to set)
  const unassignedReps = reps.filter(r => !r.reports_to || !managers.some(m => m.id === r.reports_to));
  if (unassignedReps.length && midManagers.length > 0) {
    html += '<div class="profile-card" style="border-left:4px solid var(--g300);margin-bottom:16px">';
    html += '<div style="font-weight:700;font-size:14px;margin-bottom:12px;color:var(--g500)">Unassigned Reps</div>';
    html += '<div style="margin-left:24px;border-left:2px solid var(--g200);padding-left:16px">';
    unassignedReps.forEach(rep => {
      const repAccounts = (state.accounts || []).filter(a => a.assigned_to === rep.id).length;
      html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)">
        <div style="width:30px;height:30px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:var(--g600)">${(rep.full_name||'?')[0]}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">${esc(rep.full_name)}</div>

        <div style="font-size:12px;color:var(--g500)">${repAccounts} account${repAccounts!==1?'s':''}</div>

    html += '</div></div>';
  }

  html += '</div>';
  el.innerHTML = html;
}

let adminSort = { col: 'name', dir: 'asc' };
function sortAdminCol(col) {
  if (adminSort.col === col) adminSort.dir = adminSort.dir === 'asc' ? 'desc' : 'asc';
  else { adminSort.col = col; adminSort.dir = 'asc'; }
  renderAdminPanel();
}

function renderAdminPanel() {
  const el = document.getElementById('view-admin');
  if (state.profile?.role !== 'admin') {
    el.innerHTML = '<div class="view-header"><h1>Access Denied</h1></div><p style="padding:16px">Admin access required.</p>';
    return;
  }

  const allProfiles = (state.profiles || []);
  const sortFn = (a, b) => {
    let va, vb;
    switch (adminSort.col) {
      case 'name': va = a.full_name||''; vb = b.full_name||''; break;
      case 'role': va = a.role||''; vb = b.role||''; break;
      case 'country': va = a.country||''; vb = b.country||''; break;
      case 'reports_to':
        va = (allProfiles.find(m=>m.id===a.reports_to)?.full_name)||'';
        vb = (allProfiles.find(m=>m.id===b.reports_to)?.full_name)||'';
        break;
      case 'admin': va = a.role==='admin'?'0':'1'; vb = b.role==='admin'?'0':'1'; break;
      case 'status': va = a.locked?'1':'0'; vb = b.locked?'1':'0'; break;
      default: va = a.full_name||''; vb = b.full_name||'';
    }
    const cmp = String(va).localeCompare(String(vb));
    return adminSort.dir === 'asc' ? cmp : -cmp;
  };
  const profiles = [...allProfiles].sort(sortFn);
  const arrow = (col) => adminSort.col===col ? (adminSort.dir==='asc'?' ▲':' ▼') : '';
  const reps = profiles.filter(p => p.role === 'rep');
  const managers = profiles.filter(p => p.role === 'manager' || p.role === 'admin');

  el.innerHTML = `
    <div class="view-header"><h1>Admin</h1></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 12px 12px">
      <div class="dash-section" style="margin:0">
        <h3 style="font-size:13px;margin-bottom:10px">Reassign Account</h3>
        <div style="display:flex;flex-direction:column;gap:8px">
          <select id="reassign-account" style="padding:8px 10px;border:1px solid var(--g200);border-radius:4px;font-size:13px;width:100%">
            <option value="">Select account…</option>
            ${[...state.accounts].sort((a,b)=>a.company_name.localeCompare(b.company_name)).map(a => `<option value="${a.id}">${esc(a.company_name)} — ${getRepName(a.assigned_to)||'—'}</option>`).join('')}
          </select>
          <select id="reassign-to" style="padding:8px 10px;border:1px solid var(--g200);border-radius:4px;font-size:13px;width:100%">
            <option value="">Select new rep…</option>
            ${profiles.map(p => `<option value="${p.id}">${esc(p.full_name)}</option>`).join('')}
          </select>
          <button onclick="adminReassignAccount()" class="btn-primary" style="padding:8px 16px;font-size:13px;width:100%">Reassign</button>
        </div>
      </div>
      <div class="dash-section" style="margin:0">
        <h3 style="font-size:13px;margin-bottom:10px">Bulk Transfer</h3>
        <div style="display:flex;flex-direction:column;gap:8px">
          <select id="transfer-from" style="padding:8px 10px;border:1px solid var(--g200);border-radius:4px;font-size:13px;width:100%">
            <option value="">Transfer from…</option>
            ${profiles.map(p => `<option value="${p.id}">${esc(p.full_name)} (${state.accounts.filter(a=>a.assigned_to===p.id).length})</option>`).join('')}
          </select>
          <select id="transfer-to" style="padding:8px 10px;border:1px solid var(--g200);border-radius:4px;font-size:13px;width:100%">
            <option value="">Transfer to…</option>
            ${profiles.map(p => `<option value="${p.id}">${esc(p.full_name)}</option>`).join('')}
          </select>
          <button onclick="adminTransferAccounts()" class="btn-primary" style="padding:8px 16px;font-size:13px;width:100%">Transfer All</button>
        </div>
      </div>
    </div>

    <!-- User management -->
    <div class="dash-section">
      <h3>User Management</h3>
      <div class="table-wrap"><table class="data-table">
        <thead><tr>
          <th style="cursor:pointer;user-select:none" onclick="sortAdminCol('name')">Name${arrow('name')}</th>
          <th style="cursor:pointer;user-select:none" onclick="sortAdminCol('role')">Role${arrow('role')}</th>
          <th style="cursor:pointer;user-select:none" onclick="sortAdminCol('country')">Country${arrow('country')}</th>
          <th style="cursor:pointer;user-select:none" onclick="sortAdminCol('reports_to')">Reports To${arrow('reports_to')}</th>
          <th style="cursor:pointer;user-select:none" onclick="sortAdminCol('admin')">Admin${arrow('admin')}</th>
          <th style="cursor:pointer;user-select:none" onclick="sortAdminCol('status')">Status${arrow('status')}</th>
          <th>Actions</th>
        </tr></thead>
        <tbody>${profiles.map(p => {
          const mgr = profiles.find(m => m.id === p.reports_to);
          const acctCount = state.accounts.filter(a => a.assigned_to === p.id).length;
          const isLocked = p.locked;
          return `<tr style="${isLocked ? 'opacity:0.5' : ''}">
            <td><strong>${esc(p.full_name || '—')}</strong><br><span style="font-size:11px;color:var(--g400)">${acctCount} account${acctCount!==1?'s':''}</span></td>
            <td><select onchange="adminUpdateRole('${p.id}',this.value)" style="padding:4px 6px;border:1px solid var(--g200);border-radius:4px;font-size:12px">
              <option value="rep" ${getOrgRole(p)==='rep'?'selected':''}>Rep</option>
              <option value="manager" ${getOrgRole(p)==='manager'?'selected':''}>Manager</option>

              <option value="yes" ${p.role==='admin'?'selected':''}>Yes</option>
            </select></td>
            <td>${isLocked ? '<span style="color:var(--danger);font-weight:600">Locked</span>' : '<span style="color:var(--success);font-weight:600">Active</span>'}</td>

              <button onclick="adminResetPassword('${p.id}')" style="padding:4px 8px;border:1px solid var(--g200);border-radius:4px;font-size:11px;cursor:pointer;background:var(--vic-orange);color:#fff" title="Force password change on next login">Reset PW</button>
              <button onclick="adminToggleLock('${p.id}',${!isLocked})" style="padding:4px 8px;border:1px solid var(--g200);border-radius:4px;font-size:11px;cursor:pointer;background:${isLocked?'var(--success)':'var(--danger)'};color:#fff">${isLocked ? 'Unlock' : 'Lock'}</button>
              <button onclick="adminDeleteUser('${p.id}')" style="padding:4px 8px;border:1px solid var(--g200);border-radius:4px;font-size:11px;cursor:pointer;background:#dc2626;color:#fff" title="Permanently delete user and their accounts">Delete</button>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>

  `;
}

// Org role is rep or manager; admin is layered on top via role='admin' + _orgRole
function getOrgRole(p) {
  if (p.role === 'admin') return p._orgRole || 'rep';
  return p.role;
}

async function adminUpdateRole(userId, newRole) {
  try {
    const p = state.profiles.find(pr => pr.id === userId);
    if (!p) return;
    if (p.role === 'admin') {
      // Keep admin, just remember the org role
      p._orgRole = newRole;
      toast('Role updated');
      renderAdminPanel();
    } else {
      await supa.from('profiles').update({ role: newRole }).eq('id', userId);
      p.role = newRole;
      toast('Role updated');
      renderAdminPanel();
    }
  } catch (e) { toast('Error: ' + e.message); }
}

async function adminToggleAdmin(userId, val) {
  const p = state.profiles.find(pr => pr.id === userId);
  if (!p) return;
  if (val === 'yes') {
    p._orgRole = p.role;  // remember current org role
    try {
      await supa.from('profiles').update({ role: 'admin' }).eq('id', userId);
      p.role = 'admin';
      toast('Admin granted');
      renderAdminPanel();
    } catch (e) { toast('Error: ' + e.message); }
  } else {
    const restoreRole = p._orgRole || 'rep';
    try {
      await supa.from('profiles').update({ role: restoreRole }).eq('id', userId);
      p.role = restoreRole;
      delete p._orgRole;
      toast('Admin removed');
      renderAdminPanel();
    } catch (e) { toast('Error: ' + e.message); }
  }
}

async function adminToggleLock(userId, lock) {
  try {
    await supa.from('profiles').update({ locked: lock }).eq('id', userId);
    const p = state.profiles.find(pr => pr.id === userId);
    if (p) p.locked = lock;
    toast(lock ? 'User locked' : 'User unlocked');
    renderAdminPanel();
  } catch (e) { toast('Error: ' + e.message); }
}

async function adminUpdateCountry(userId, country) {
  try {
    await supa.from('profiles').update({ country: country || null }).eq('id', userId);
    const p = state.profiles.find(pr => pr.id === userId);
    if (p) p.country = country || null;
    toast('Country updated');
  } catch (e) { toast('Error: ' + e.message); }
}

async function adminUpdateReportsTo(userId, reportsTo) {
  try {
    await supa.from('profiles').update({ reports_to: reportsTo || null }).eq('id', userId);
    const p = state.profiles.find(pr => pr.id === userId);
    if (p) p.reports_to = reportsTo || null;
    toast('Reports to updated');
  } catch (e) { toast('Error: ' + e.message); }
}

async function adminReassignAccount() {
  const acctId = document.getElementById('reassign-account').value;
  const toId = document.getElementById('reassign-to').value;
  if (!acctId || !toId) { toast('Select an account and a rep'); return; }
  const acct = state.accounts.find(a => a.id === acctId);
  if (!acct) { toast('Account not found'); return; }
  const toName = getRepName(toId);
  if (!confirm(`Reassign "${acct.company_name}" to ${toName}?`)) return;
  try {
    await supa.from('kac_accounts').update({ assigned_to: toId }).eq('id', acctId);
    acct.assigned_to = toId;
    toast(`${acct.company_name} → ${toName}`);
    renderAdminPanel();
  } catch (e) { toast('Error: ' + e.message); }
}

async function adminTransferAccounts() {
  const fromId = document.getElementById('transfer-from').value;
  const toId = document.getElementById('transfer-to').value;
  if (!fromId || !toId) { toast('Select both reps'); return; }
  if (fromId === toId) { toast('Cannot transfer to same rep'); return; }
  const accts = state.accounts.filter(a => a.assigned_to === fromId);
  if (!accts.length) { toast('No accounts to transfer'); return; }
  const fromName = getRepName(fromId);
  const toName = getRepName(toId);
  if (!confirm(`Transfer ${accts.length} account${accts.length!==1?'s':''} from ${fromName} to ${toName}?`)) return;
  try {
    await supa.from('kac_accounts').update({ assigned_to: toId }).eq('assigned_to', fromId);
    accts.forEach(a => a.assigned_to = toId);
    toast(`${accts.length} accounts transferred to ${toName}`);
    renderAdminPanel();
  } catch (e) { toast('Error: ' + e.message); }
}

async function adminForcePasswordReset() {
  const userId = document.getElementById('reset-pw-user').value;
  if (!userId) { toast('Select a user'); return; }
  const name = getRepName(userId);
  if (!confirm(`Force ${name} to change password on next login?`)) return;
  try {
    await supa.from('profiles').update({ must_change_password: true }).eq('id', userId);
    const p = state.profiles.find(pr => pr.id === userId);
    if (p) p.must_change_password = true;
    toast(`${name} must change password on next login`);
  } catch (e) { toast('Error: ' + e.message); }
}

async function adminResetPassword(userId) {
  const name = getRepName(userId);
  if (!confirm(`Force ${name} to change password on next login?`)) return;
  try {
    await supa.from('profiles').update({ must_change_password: true }).eq('id', userId);
    const p = state.profiles.find(pr => pr.id === userId);
    if (p) p.must_change_password = true;
    toast(`${name} must change password on next login`);
  } catch (e) { toast('Error: ' + e.message); }
}

async function adminDeleteUser(userId) {
  if (userId === state.profile?.id) { toast('Cannot delete yourself'); return; }
  const name = getRepName(userId);
  const accts = state.accounts.filter(a => a.assigned_to === userId);
  const msg = accts.length
    ? `Permanently delete ${name} and their ${accts.length} account${accts.length!==1?'s':''}? This cannot be undone.`
    : `Permanently delete ${name}? This cannot be undone.`;
  if (!confirm(msg)) return;
  if (!confirm(`Are you absolutely sure? Type OK to confirm deletion of ${name}.`)) return;
  try {
    // Delete their accounts first
    if (accts.length) {
      await supa.from('kac_accounts').delete().eq('assigned_to', userId);
      state.accounts = state.accounts.filter(a => a.assigned_to !== userId);
    }
    // Delete profile
    await supa.from('profiles').delete().eq('id', userId);
    state.profiles = state.profiles.filter(p => p.id !== userId);
    toast(`${name} permanently deleted`);
    renderAdminPanel();
  } catch (e) { toast('Error: ' + e.message); }
}

function renderProfile() {
  const el = document.getElementById('view-profile');
  const p = state.profile || {};
  el.innerHTML = `

    </div>

      <h3>Data</h3>
      <div class="profile-row"><span class="label">Total Accounts</span><span class="value">${state.accounts.length}</span></div>
      <div class="profile-row"><span class="label">Sync Status</span><span class="value">${state.syncStatus === 'synced' ? 'All data backed up' : state.syncStatus === 'offline' ? 'Offline — saved locally' : 'Syncing...'}</span></div>

      <h3>Security</h3>

        <div class="form-group" style="margin-bottom:12px">
          <label style="font-size:13px;font-weight:600;color:var(--g500)">Confirm Password</label>
          <input type="password" id="pw-confirm" placeholder="Repeat new password" style="width:100%;padding:10px 12px;border:1px solid var(--g200);border-radius:var(--radius-xs);font-size:14px">
        </div>
        <button class="btn-export" onclick="handleChangePassword()" style="background:var(--vic-orange);color:#fff;width:100%">Change Password</button>
      </div>
    </div>
    <div class="profile-card">
      <h3>App</h3>
      <div class="profile-row"><span class="label">Version</span><span class="value">1.0.0</span></div>
      <div class="profile-row"><span class="label">Last Sync</span><span class="value">${formatDateTime(new Date().toISOString())}</span></div>
    </div>
    <div style="padding:0 16px 24px">
      <button onclick="saveProfileAndExit()" style="width:100%;padding:14px;background:var(--vic-orange);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer">Save & Return to Dashboard</button>
    </div>
  `;
}

async function saveProfileAndExit() {
  toast('Profile saved');
  showView('dashboard');
}

async function handleChangeCountry(val) {
  try {
    await supa.from('profiles').update({ country: val }).eq('id', state.user.id);
    state.profile.country = val;
    toast('Country updated');
    // Re-render profile to update region options
    showView('profile');
  } catch (e) { toast('Error: ' + e.message); }
}

async function handleChangeRegion(region) {
  try {
    const { error } = await supa.from('profiles').update({ region }).eq('id', state.user.id);
    if (error) throw error;
    state.profile.region = region;
    toast('Region updated');
  } catch (err) {
    toast('Error: ' + err.message);
  }
}

async function handleChangePassword() {
  const pw = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  if (!pw || pw.length < 8) { toast('Password must be at least 8 characters'); return; }
  if (pw !== confirm) { toast('Passwords do not match'); return; }
  try {
    const { error } = await supabase.auth.updateUser({ password: pw });
    if (error) throw error;
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
    toast('Password updated successfully');
  } catch (err) {
    toast('Error: ' + err.message);
  }
}

function exportData() {
  const data = {
    exported_at: new Date().toISOString(),
    accounts: state.accounts,
    checklist: state.checklist,
    contacts: state.contacts,
    notes: state.notes
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kac_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup exported');
}

// ======================== PDF REPORT ========================
function generatePDFReport() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const isManager = state.profile?.role === 'manager' || state.profile?.role === 'admin';
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 14;
  const VIC_ORANGE = [245, 130, 32];
  const VIC_BLACK = [26, 26, 26];
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });

  function addHeader(title) {
    // Orange top band
    doc.setFillColor(...VIC_ORANGE);
    doc.rect(0, 0, pageW, 18, 'F');
    // Black band below
    doc.setFillColor(...VIC_BLACK);
    doc.rect(0, 18, pageW, 10, 'F');
    // Title in orange band
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('VICTAULIC', margin, 12);
    doc.setFontSize(10);
    doc.text('KEY ACCOUNT CONVERSION', margin + 52, 12);
    // Subtitle in black band
    doc.setFontSize(9);
    doc.text(title.toUpperCase(), margin, 25);
    doc.text(dateStr, pageW - margin, 25, { align: 'right' });
    doc.setTextColor(0, 0, 0);
    return 34;
  }

  function addFooter(pageNum) {
    doc.setFontSize(7);
    doc.setTextColor(150, 150, 150);
    doc.text('CONFIDENTIAL — Victaulic Account Conversion Report', margin, pageH - 6);
    doc.text(`Page ${pageNum}`, pageW - margin, pageH - 6, { align: 'right' });
    doc.setTextColor(0, 0, 0);
  }

  function stageProgressText(accountId) {
    let parts = [];
    for (let s = 1; s <= 5; s++) {
      const c = getStageCompletion(accountId, s);
      parts.push(`${c.done}/${c.total}`);
    }
    return parts.join(' | ');
  }

  function overallProgress(accountId) {
    const totalItems = Object.values(STAGES).reduce((s, st) => s + st.items.length, 0);
    const totalDone = Object.keys(STAGES).reduce((s, k) => s + getStageCompletion(accountId, parseInt(k)).done, 0);
    return Math.round(totalDone / totalItems * 100);
  }

  let pageNum = 1;
  const accounts = isManager ? [...state.accounts] : state.accounts.filter(a => a.assigned_to === state.user?.id);
  accounts.sort((a, b) => a.tier - b.tier || a.company_name.localeCompare(b.company_name));

  // ─── PAGE 1: OVERVIEW ───
  let y = addHeader(isManager ? 'Team Report' : 'My Accounts Report');

  // Summary stats
  const au = accounts.filter(a => a.country === 'AU');
  const nz = accounts.filter(a => a.country === 'NZ');
  const stageCounts = [0, 0, 0, 0, 0];
  accounts.forEach(a => stageCounts[a.current_stage - 1]++);

  doc.setFontSize(12);
  doc.setFont('helvetica', 'bold');
  doc.text('Overview', margin, y);
  y += 7;

  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  const stats = [
    `Total Accounts: ${accounts.length}`,
    `Australia: ${au.length}`,
    `New Zealand: ${nz.length}`,
    `Converting (Stage 4+): ${accounts.filter(a => a.current_stage >= 4).length}`
  ];
  stats.forEach((s, i) => {
    doc.text(s, margin + (i * 55), y);
  });
  y += 10;

  // Funnel summary
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('Conversion Funnel', margin, y);
  y += 7;
  const stageNames = ['IDENTIFY', 'ENGAGE', 'DEMONSTRATE', 'CONVERT', 'GROW & RETAIN'];
  const barMax = Math.max(...stageCounts, 1);
  const stageColors = [[245,130,32],[245,158,11],[59,130,246],[16,185,129],[5,150,105]];
  stageNames.forEach((name, i) => {
    const barW = Math.max((stageCounts[i] / barMax) * 120, 8);
    doc.setFillColor(...stageColors[i]);
    doc.rect(margin + 40, y - 3.5, barW, 5, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.text(name, margin, y);
    doc.text(String(stageCounts[i]), margin + 42 + barW, y);
    y += 7;
  });
  y += 5;

  // Tier breakdown
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('Tier Breakdown', margin, y);
  y += 6;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  [1, 2, 3].forEach(t => {
    doc.text(`Tier ${t}: ${accounts.filter(a => a.tier === t).length} accounts`, margin + ((t - 1) * 55), y);
  });
  y += 10;

  // Needs Attention
  const weaknesses = [];
  accounts.forEach(a => {
    const comp = getStageCompletion(a.id, a.current_stage);
    if (comp.pct < 50 && comp.total > 0) weaknesses.push({ name: a.company_name, stage: STAGES[a.current_stage].name, pct: comp.pct, tier: a.tier });
  });
  weaknesses.sort((a, b) => a.pct - b.pct);
  if (weaknesses.length) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text('Needs Attention', margin, y);
    y += 2;
    doc.autoTable({
      startY: y,
      margin: { left: margin, right: margin },
      head: [['Company', 'Tier', 'Current Stage', 'Progress']],
      body: weaknesses.slice(0, 10).map(w => [w.name, `T${w.tier}`, w.stage, `${w.pct}%`]),
      styles: { fontSize: 8, cellPadding: 2, font: 'helvetica' },
      headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [248, 248, 248] },
      columnStyles: { 3: { halign: 'center' } }
    });
    y = doc.lastAutoTable.finalY + 8;
  }

  addFooter(pageNum);

  // ─── PAGE 2: ACCOUNTS TABLE ───
  doc.addPage('a4', 'landscape');
  pageNum++;
  y = addHeader('Account Details');

  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    head: [['Company', 'Country', 'Tier', 'Regions', 'Sectors', 'Currency', 'Revenue', 'Stage', 'ID|ENG|DEM|CON|GRO', 'Progress', 'Rep']],
    body: accounts.map(a => [
      a.company_name,
      a.country,
      `T${a.tier}`,
      a.regions || '—',
      a.key_sectors || '—',
      a.currency || 'AUD',
      a.estimated_revenue ? `$${formatNumber(a.estimated_revenue)}` : '—',
      STAGES[a.current_stage].name,
      stageProgressText(a.id),
      `${overallProgress(a.id)}%`,
      getRepName(a.assigned_to) || '—'
    ]),
    styles: { fontSize: 7, cellPadding: 2, font: 'helvetica', overflow: 'linebreak' },
    headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold', fontSize: 7 },
    alternateRowStyles: { fillColor: [248, 248, 248] },
    columnStyles: {
      0: { cellWidth: 35 },
      3: { cellWidth: 25 },
      4: { cellWidth: 30 },
      8: { cellWidth: 32, halign: 'center', fontSize: 6 },
      9: { halign: 'center' },
      10: { cellWidth: 25 }
    },
    didParseCell: function(data) {
      if (data.section === 'body' && data.column.index === 9) {
        const pct = parseInt(data.cell.raw);
        if (pct >= 80) data.cell.styles.textColor = [5, 150, 105];
        else if (pct >= 40) data.cell.styles.textColor = [245, 158, 11];
        else data.cell.styles.textColor = [220, 38, 38];
      }
    }
  });

  addFooter(pageNum);

  // ─── PAGE 3+: PER-REP BREAKDOWN (managers only) ───
  if (isManager) {
    const reps = {};
    accounts.forEach(a => {
      const name = getRepName(a.assigned_to) || 'Unassigned';
      if (!reps[name]) reps[name] = [];
      reps[name].push(a);
    });

    Object.entries(reps).sort((a, b) => a[0].localeCompare(b[0])).forEach(([repName, repAccounts]) => {
      doc.addPage('a4', 'landscape');
      pageNum++;
      y = addHeader(`Rep: ${repName}`);

      // Rep summary
      const repStages = [0, 0, 0, 0, 0];
      repAccounts.forEach(a => repStages[a.current_stage - 1]++);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text(`Accounts: ${repAccounts.length}   |   AU: ${repAccounts.filter(a=>a.country==='AU').length}   |   NZ: ${repAccounts.filter(a=>a.country==='NZ').length}   |   Regions: ${[...new Set(repAccounts.flatMap(a=>(a.regions||'').split(',').map(s=>s.trim()).filter(Boolean)))].join(', ') || '—'}`, margin, y);
      y += 8;

      doc.autoTable({
        startY: y,
        margin: { left: margin, right: margin },
        head: [['Company', 'Country', 'Tier', 'Regions', 'Stage', 'ID|ENG|DEM|CON|GRO', 'Progress']],
        body: repAccounts.sort((a,b) => a.tier - b.tier || a.company_name.localeCompare(b.company_name)).map(a => [
          a.company_name,
          a.country,
          `T${a.tier}`,
          a.regions || '—',
          STAGES[a.current_stage].name,
          stageProgressText(a.id),
          `${overallProgress(a.id)}%`
        ]),
        styles: { fontSize: 8, cellPadding: 2, font: 'helvetica' },
        headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold' },
        alternateRowStyles: { fillColor: [248, 248, 248] },
        columnStyles: {
          5: { halign: 'center', fontSize: 7 },
          6: { halign: 'center' }
        },
        didParseCell: function(data) {
          if (data.section === 'body' && data.column.index === 6) {
            const pct = parseInt(data.cell.raw);
            if (pct >= 80) data.cell.styles.textColor = [5, 150, 105];
            else if (pct >= 40) data.cell.styles.textColor = [245, 158, 11];
            else data.cell.styles.textColor = [220, 38, 38];
          }
        }
      });

      addFooter(pageNum);
    });
  }

  // ─── REGION HEATMAP PAGE ───
  doc.addPage('a4', 'landscape');
  pageNum++;
  y = addHeader('Region Heatmap');

  const auStates = ['NSW','VIC','QLD','WA','SA','TAS','ACT','NT'];
  const nzRegions = ['NTL','AKL','WKO','BOP','GIS','HKB','TKI','MWT','WGN','TSM','NSN','MBH','WTC','CAN','OTA','STL'];

  // Show both countries for managers, only user's country for reps
  const pdfShowAU = isManager || state.profile?.country === 'AU' || !state.profile?.country;
  const pdfShowNZ = isManager || state.profile?.country === 'NZ';

  function countByRegion(regionList) {
    const counts = {};
    regionList.forEach(r => counts[r] = { total: 0, stages: [0,0,0,0,0] });
    accounts.forEach(a => {
      (a.regions || '').split(',').map(s=>s.trim()).filter(Boolean).forEach(r => {
        if (counts[r]) {
          counts[r].total++;
          counts[r].stages[a.current_stage - 1]++;
        }
      });
    });
    return counts;
  }

  const auC = countByRegion(auStates);
  const nzC = countByRegion(nzRegions);

  // AU heatmap table
  if (pdfShowAU) {
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('Australia', margin, y);
  y += 2;
  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    head: [['State', 'Total', 'Identify', 'Engage', 'Demonstrate', 'Convert', 'Grow']],
    body: auStates.map(r => [r, auC[r].total, ...auC[r].stages]),
    styles: { fontSize: 8, cellPadding: 2, font: 'helvetica', halign: 'center' },
    headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold' },
    columnStyles: { 0: { halign: 'left', fontStyle: 'bold' } },
    didParseCell: function(data) {
      if (data.section === 'body' && data.column.index === 1) {
        const v = data.cell.raw;
        if (v > 5) data.cell.styles.fillColor = [245, 130, 32]; // high
        else if (v > 2) data.cell.styles.fillColor = [253, 186, 116]; // med
        else if (v > 0) data.cell.styles.fillColor = [254, 243, 199]; // low
      }
    }
  });
  y = doc.lastAutoTable.finalY + 8;
  }

  if (pdfShowNZ) {
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('New Zealand', margin, y);
  y += 2;
  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    head: [['Region', 'Total', 'Identify', 'Engage', 'Demonstrate', 'Convert', 'Grow']],
    body: nzRegions.map(r => [r, nzC[r].total, ...nzC[r].stages]),
    styles: { fontSize: 8, cellPadding: 2, font: 'helvetica', halign: 'center' },
    headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold' },
    columnStyles: { 0: { halign: 'left', fontStyle: 'bold' } },
    didParseCell: function(data) {
      if (data.section === 'body' && data.column.index === 1) {
        const v = data.cell.raw;
        if (v > 5) data.cell.styles.fillColor = [245, 130, 32];
        else if (v > 2) data.cell.styles.fillColor = [253, 186, 116];
        else if (v > 0) data.cell.styles.fillColor = [254, 243, 199];
      }
    }
  });
  }

  addFooter(pageNum);

  // Save
  const filename = isManager
    ? `KAC_Team_Report_${now.toISOString().slice(0,10)}.pdf`
    : `KAC_My_Report_${now.toISOString().slice(0,10)}.pdf`;
  doc.save(filename);
  toast('PDF report downloaded');
}

function generateTeamSummaryPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 14;
  const VIC_ORANGE = [245, 130, 32];
  const VIC_BLACK = [26, 26, 26];
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });

  // Header
  doc.setFillColor(...VIC_ORANGE);
  doc.rect(0, 0, pageW, 18, 'F');
  doc.setFillColor(...VIC_BLACK);
  doc.rect(0, 18, pageW, 10, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text('VICTAULIC', margin, 12);
  doc.setFontSize(10);
  doc.text('TEAM SUMMARY REPORT', margin + 52, 12);
  doc.setFontSize(9);
  doc.text('KEY ACCOUNT CONVERSION — AU & NZ', margin, 25);

  // Overview stats
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.text('Overview', margin, y);
  y += 7;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  const totalRev = accounts.reduce((s,a) => s + toDisplayCurrency(parseFloat(a.estimated_revenue)||0, a.currency), 0);

    return [
      p.full_name || '—',
      p.role || '—',
      p.country || '—',
      mgr ? mgr.full_name : '—',
      pAccounts.length,
      avgStage,
      ...stageCounts,
      rev ? `${fxSymbol()}${formatNumber(Math.round(rev))}` : '—',
      regions || '—'
    ];
  });

  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    head: [['Name', 'Role', 'Country', 'Reports To', 'Accounts', 'Avg Stage', 'S1', 'S2', 'S3', 'S4', 'S5', 'Pipeline', 'Regions']],
    body: rows,
    styles: { fontSize: 7, cellPadding: 2, font: 'helvetica', overflow: 'linebreak' },
    headStyles: { fillColor: VIC_BLACK, textColor: [255,255,255], fontStyle: 'bold', fontSize: 7 },
    alternateRowStyles: { fillColor: [248, 248, 248] },
    columnStyles: {
      0: { cellWidth: 28, fontStyle: 'bold' },
      4: { halign: 'center' },
      5: { halign: 'center' },
      6: { halign: 'center' },
      7: { halign: 'center' },
      8: { halign: 'center' },
      9: { halign: 'center' },
      10: { halign: 'center' },
      12: { cellWidth: 35 }
    },
    didParseCell: function(data) {
      if (data.section === 'body' && data.column.index === 4) {
        const v = parseInt(data.cell.raw);
        if (v >= 5) data.cell.styles.textColor = [5, 150, 105];
        else if (v > 0) data.cell.styles.textColor = [245, 158, 11];
      }
    }
  });

  // Footer
  doc.setFontSize(7);
  doc.setTextColor(150, 150, 150);
  doc.text('CONFIDENTIAL — Victaulic Account Conversion Team Summary', margin, pageH - 6);
  doc.text('Page 1', pageW - margin, pageH - 6, { align: 'right' });

  doc.save(`KAC_Team_Summary_${now.toISOString().slice(0,10)}.pdf`);
  toast('Team summary exported');
}

// ======================== SECTOR CHIPS ========================
function renderChips(wrapperId, options, selectedStr) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const selected = (selectedStr || '').split(',').map(s => s.trim()).filter(Boolean);
  wrap.innerHTML = options.map(s =>
    `<span class="sector-chip ${selected.includes(s) ? 'selected' : ''}" onclick="this.classList.toggle('selected')">${s}</span>`
  ).join('');
}
function getChipValues(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return '';
  return [...wrap.querySelectorAll('.sector-chip.selected')].map(el => el.textContent).join(', ');
}
// Backwards compat
function renderSectorChips(id, sel) { renderChips(id, SECTORS, sel); }
function getSelectedSectors() { return getChipValues('acc-sectors-wrap'); }

async function handleSaveAccount(e, existingId) {
  e.preventDefault();
  const data = existingId ? { ...state.accounts.find(a => a.id === existingId) } : {};
  data.company_name = document.getElementById('acc-name').value.trim();
  data.country = document.getElementById('acc-country').value;
  data.tier = parseInt(document.getElementById('acc-tier').value);
  data.hq_city = document.getElementById('acc-city').value.trim();
  data.key_sectors = getChipValues('acc-sectors-wrap');
  data.regions = getChipValues('acc-regions-wrap');
  data.currency = document.getElementById('acc-currency').value;
  data.estimated_revenue = document.getElementById('acc-revenue').value.replace(/,/g, '').trim();
  if (existingId) data.psa_tier = document.getElementById('acc-psa')?.value || '';
  if (existingId) data.assigned_to = document.getElementById('acc-assigned')?.value || data.assigned_to;

  await saveAccount(data);
  closeModal();
  renderAccountsList();
  if (existingId) renderAccountDetail();
  toast(existingId ? 'Account updated' : 'Account added');
}

  if (!confirm('Delete this account and all its data? This cannot be undone.')) return;
  await deleteAccount(id);
  closeModal();
  showView('accounts');
  toast('Account deleted');
}

// ======================== INIT ========================
async function init() {
  // Restore remember-me checkbox state
  const rememberPref = localStorage.getItem('kac_remember_me');
  const rememberBox = document.getElementById('login-remember');
  if (rememberBox && rememberPref !== null) rememberBox.checked = rememberPref !== 'false';

  // Check for existing session
  const { data: { session } } = await supa.auth.getSession();
  if (session) {
    state.user = session.user;
    await loadProfile();
    if (state.profile?.must_change_password) {
      showForcePasswordChange();
    } else {
      await initialSync();
      enterApp();
    }
  }

  // Listen for auth state changes (handles password reset redirect)
  supa.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      const newPw = prompt('Enter your new password:');
      if (newPw) {
        supa.auth.updateUser({ password: newPw }).then(({ error }) => {
          if (error) alert('Error: ' + error.message);
          else { alert('Password updated. Please sign in.'); showLoginForm(); }
        });
      }
    }
  });
}

init();
